<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sundance Marin Card — Mockup</title>
<style>
/* ── HA CSS Variable defaults (simulates HA dark theme) ─────────── */
:root {
  --primary-color:              #03a9f4;
  --accent-color:               #ff9800;
  --card-background-color:      #1c1c1c;
  --primary-background-color:   #111111;
  --secondary-background-color: #2d2d2d;
  --primary-text-color:         #e1e1e1;
  --secondary-text-color:       #9e9e9e;
  --disabled-text-color:        #5a5a5a;
  --divider-color:              #383838;
  --state-icon-active-color:    #fdd835;
  --state-icon-color:           #9e9e9e;
  --success-color:              #4caf50;
  --warning-color:              #ff9800;
  --error-color:                #f44336;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--primary-background-color);
  font-family: system-ui, -apple-system, sans-serif;
  padding: 24px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

/* ── Demo controls ──────────────────────────────────────────────── */
.demo-bar {
  width: 100%;
  max-width: 480px;
  background: #1a2a1a;
  border: 1px solid #2a4a2a;
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-size: .75rem;
  color: #7a9a7a;
}
.demo-bar strong { color: #8ac88a; }
.demo-btn {
  background: #2a3a2a;
  border: 1px solid #3a5a3a;
  color: #8ac88a;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: .72rem;
  cursor: pointer;
}
.demo-btn:hover { background: #3a4a3a; }

/* ── HA Card shell ──────────────────────────────────────────────── */
.ha-card {
  width: 100%;
  max-width: 480px;
  background: var(--card-background-color);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
  color: var(--primary-text-color);
  font-size: .9rem;
}

/* ── Card header ────────────────────────────────────────────────── */
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--divider-color);
}
.conn-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--success-color);
  flex-shrink: 0;
  transition: background .3s;
}
.conn-dot.off { background: var(--error-color); }
.card-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary-text-color);
  flex: 1;
}
.card-subtitle {
  font-size: .72rem;
  color: var(--secondary-text-color);
}

/* ── Sections ───────────────────────────────────────────────────── */
.section {
  padding: 12px 16px;
  border-bottom: 1px solid var(--divider-color);
}
.section:last-child { border-bottom: none; }
.section-title {
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--secondary-text-color);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ── Temperature ────────────────────────────────────────────────── */
.temp-row {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.temp-current .temp-val {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--primary-color);
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.temp-lbl {
  font-size: .68rem;
  color: var(--secondary-text-color);
  margin-top: 3px;
}
.temp-setpoint {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.sp-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-round {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1px solid var(--divider-color);
  background: var(--secondary-background-color);
  color: var(--primary-text-color);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.btn-round:hover { background: var(--primary-color); border-color: var(--primary-color); color: #fff; }
.sp-val {
  font-size: 1.1rem;
  font-weight: 600;
  min-width: 54px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.btn-set {
  padding: 6px 14px;
  background: var(--primary-color);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: .8rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.btn-set:hover { opacity: .85; }
.heating-indicator {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  margin-top: 8px;
  font-size: .78rem;
  color: var(--secondary-text-color);
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--secondary-background-color);
  border: 1px solid var(--divider-color);
}
.heating-indicator.active {
  color: var(--warning-color);
  border-color: var(--warning-color);
  background: rgba(255,152,0,.08);
}
.mdi-icon {
  font-size: .95rem;
  width: 18px;
  text-align: center;
}

/* ── Toggle buttons (pumps / blower) ────────────────────────────── */
.btn-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.btn-toggle {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--divider-color);
  background: var(--secondary-background-color);
  color: var(--secondary-text-color);
  font-size: .75rem;
  font-weight: 500;
  cursor: pointer;
  min-width: 70px;
  transition: all .15s;
}
.btn-toggle .icon { font-size: 1.2rem; }
.btn-toggle.on {
  background: rgba(3,169,244,.15);
  border-color: var(--primary-color);
  color: var(--primary-color);
}
.btn-toggle:hover { opacity: .85; }
.btn-toggle:active { opacity: .7; transform: scale(.97); }

/* ── Color circles (Innenlicht) ─────────────────────────────────── */
.light-status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.light-badge {
  font-size: .78rem;
  padding: 2px 10px;
  border-radius: 12px;
  border: 1px solid var(--divider-color);
  color: var(--secondary-text-color);
}
.light-badge.on {
  color: var(--state-icon-active-color);
  border-color: var(--state-icon-active-color);
  background: rgba(253,216,53,.08);
}
.color-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.color-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color .15s, transform .15s;
}
.color-btn:hover { transform: scale(1.1); }
.color-btn.active {
  border-color: var(--primary-text-color);
  box-shadow: 0 0 0 1px rgba(255,255,255,.3);
}
.color-btn-off {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--secondary-background-color);
  border: 2px solid var(--divider-color);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .9rem;
  color: var(--secondary-text-color);
  flex-shrink: 0;
  transition: border-color .15s;
}
.color-btn-off:hover { border-color: var(--error-color); color: var(--error-color); }
.color-btn-off.active {
  border-color: var(--disabled-text-color);
  color: var(--disabled-text-color);
}

/* ── Außenlicht ─────────────────────────────────────────────────── */
.outer-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ── Readings grid ──────────────────────────────────────────────── */
.readings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.reading {
  background: var(--primary-background-color);
  border-radius: 8px;
  padding: 8px 10px;
  border: 1px solid var(--divider-color);
}
.reading-lbl {
  font-size: .64rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--disabled-text-color);
  margin-bottom: 3px;
}
.reading-val {
  font-size: .88rem;
  font-weight: 600;
  color: var(--secondary-text-color);
  display: flex;
  align-items: center;
  gap: 4px;
}
.reading-val.active { color: var(--success-color); }
.reading-val.heat   { color: var(--warning-color); }

/* ── Status bar ─────────────────────────────────────────────────── */
.status-bar {
  padding: 6px 16px;
  font-size: .65rem;
  color: var(--disabled-text-color);
  text-align: right;
  border-top: 1px solid var(--divider-color);
  background: var(--primary-background-color);
}
</style>
</head>
<body>

<div class="demo-bar">
  <strong>Mockup — Demo</strong>
  <button class="demo-btn" onclick="toggleHeating()">Heizung toggle</button>
  <button class="demo-btn" onclick="togglePump1()">Düse 1 toggle</button>
  <button class="demo-btn" onclick="toggleLight()">Innenlicht toggle</button>
  <button class="demo-btn" onclick="toggleConnection()">Verbindung toggle</button>
</div>

<div class="ha-card">

  <!-- Header -->
  <div class="card-header">
    <div class="conn-dot" id="connDot"></div>
    <span class="card-title">Sundance Marin</span>
    <span class="card-subtitle" id="cardSubtitle">verbunden</span>
  </div>

  <!-- Temperatur -->
  <div class="section">
    <div class="section-title">Temperatur</div>
    <div class="temp-row">
      <div class="temp-current">
        <div class="temp-val" id="curTemp">37.5°C</div>
        <div class="temp-lbl">Aktuell</div>
      </div>
      <div class="temp-setpoint">
        <div class="sp-ctrl">
          <button class="btn-round" onclick="adjSP(-0.5)" title="-0.5 °C">−</button>
          <span class="sp-val" id="spVal">38.0°C</span>
          <button class="btn-round" onclick="adjSP(+0.5)" title="+0.5 °C">+</button>
        </div>
        <button class="btn-set" onclick="sendSP()">SET</button>
        <div class="temp-lbl">Ziel</div>
      </div>
    </div>
    <div class="heating-indicator" id="heatingIndicator">
      <span class="mdi-icon" id="heatingIcon">🔥</span>
      <span id="heatingLabel">Bereit</span>
    </div>
  </div>

  <!-- Pumpen & Gebläse -->
  <div class="section">
    <div class="section-title">Pumpen &amp; Gebläse</div>
    <div class="btn-row">
      <button class="btn-toggle" id="btnPump1" onclick="clickToggle('pump1')">
        <span class="icon">💧</span>Düse 1
      </button>
      <button class="btn-toggle" id="btnPump2" onclick="clickToggle('pump2')">
        <span class="icon">💧</span>Düse 2
      </button>
      <button class="btn-toggle" id="btnBlower" onclick="clickToggle('blower')">
        <span class="icon">🌬</span>Gebläse
      </button>
    </div>
  </div>

  <!-- Innenlicht -->
  <div class="section">
    <div class="section-title">
      Innenlicht
    </div>
    <div class="light-status-row">
      <span class="light-badge" id="innerLightBadge">Aus</span>
      <span style="font-size:.72rem;color:var(--secondary-text-color)">Farbe wählen = einschalten</span>
    </div>
    <div class="color-row" id="colorRow">
      <!-- built by JS -->
    </div>
  </div>

  <!-- Außenlicht -->
  <div class="section">
    <div class="section-title">Außenlicht</div>
    <div class="outer-row">
      <span class="light-badge" id="outerLightBadge">Aus</span>
      <button class="btn-toggle" id="btnOuterLight" onclick="clickToggle('light2')" style="flex-direction:row;gap:6px;min-width:0;padding:8px 14px;">
        <span class="icon" style="font-size:1rem">💡</span> EIN / AUS
      </button>
    </div>
  </div>

  <!-- Status -->
  <div class="section">
    <div class="section-title">Status</div>
    <div class="readings-grid">
      <div class="reading">
        <div class="reading-lbl">Zirkulation</div>
        <div class="reading-val active" id="rvCirc">
          <span>↻</span> Läuft
        </div>
      </div>
      <div class="reading">
        <div class="reading-lbl">Heizmodus</div>
        <div class="reading-val" id="rvHeatMode">
          ⚙ Auto
        </div>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">Stand: --:-- | 37.5°C → 38.0°C</div>

</div>

<script>
const COLORS = [
  { name: 'Hellblau',   hex: '#37B5E8' },
  { name: 'Grün',       hex: '#2ECAA3' },
  { name: 'Dunkelblau', hex: '#4C8CEE' },
  { name: 'Gelb',       hex: '#F2BE48' },
  { name: 'Violett',    hex: '#B25CBD' },
  { name: 'Rot',        hex: '#EE4653' },
  { name: 'Rainbow',    hex: 'linear-gradient(135deg,#EE4653,#F2BE48,#2ECAA3,#4C8CEE)' },
];

let state = {
  connected: true,
  curTemp: 37.5,
  setTemp: 38.0,
  spDelta: 0,
  heating: false,
  pump1: false, pump2: false, blower: false,
  innerLight: false, activeColor: null,
  outerLight: false,
  circPump: true,
  heatMode: 'Auto',
};

// Build color row
(function() {
  const row = document.getElementById('colorRow');
  COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'color-btn';
    b.style.background = c.hex;
    b.title = c.name;
    b.dataset.color = c.name;
    b.addEventListener('click', () => {
      state.innerLight = true;
      state.activeColor = c.name;
      render();
    });
    row.appendChild(b);
  });
  const off = document.createElement('button');
  off.className = 'color-btn-off';
  off.title = 'Licht aus';
  off.textContent = '✕';
  off.addEventListener('click', () => {
    state.innerLight = false;
    state.activeColor = null;
    render();
  });
  row.appendChild(off);
})();

function adjSP(delta) {
  state.spDelta = Math.round((state.spDelta + delta) * 2) / 2;
  const effective = state.setTemp + state.spDelta;
  if (effective < 10 || effective > 40) { state.spDelta -= delta; return; }
  document.getElementById('spVal').textContent = effective.toFixed(1) + '°C';
}

function sendSP() {
  state.setTemp = Math.max(10, Math.min(40, state.setTemp + state.spDelta));
  state.spDelta = 0;
  render();
  const btn = document.querySelector('.btn-set');
  btn.textContent = '✓ Gesendet';
  setTimeout(() => { btn.textContent = 'SET'; }, 2000);
}

function clickToggle(key) {
  state[key] = !state[key];
  if (key === 'innerLight' && !state.innerLight) state.activeColor = null;
  render();
}

function toggleHeating()    { state.heating = !state.heating; render(); }
function togglePump1()      { state.pump1 = !state.pump1; render(); }
function toggleLight()      { state.innerLight = !state.innerLight; if (!state.innerLight) state.activeColor = null; render(); }
function toggleConnection() { state.connected = !state.connected; render(); }

function render() {
  document.getElementById('connDot').className = 'conn-dot' + (state.connected ? '' : ' off');
  document.getElementById('cardSubtitle').textContent = state.connected ? 'verbunden' : 'keine Verbindung';
  document.getElementById('curTemp').textContent = state.connected ? state.curTemp.toFixed(1) + '°C' : '—';
  document.getElementById('spVal').textContent = (state.setTemp + state.spDelta).toFixed(1) + '°C';

  const ind = document.getElementById('heatingIndicator');
  ind.className = 'heating-indicator' + (state.heating ? ' active' : '');
  document.getElementById('heatingIcon').textContent = state.heating ? '🔥' : '❄';
  document.getElementById('heatingLabel').textContent = state.heating ? 'Heizt' : 'Bereit';

  ['pump1','pump2','blower'].forEach(k => {
    const id = {pump1:'btnPump1', pump2:'btnPump2', blower:'btnBlower'}[k];
    document.getElementById(id).className = 'btn-toggle' + (state[k] ? ' on' : '');
  });

  // Inner light
  const badge = document.getElementById('innerLightBadge');
  badge.textContent = state.innerLight ? 'An' : 'Aus';
  badge.className = 'light-badge' + (state.innerLight ? ' on' : '');
  document.querySelectorAll('.color-btn').forEach(b => {
    b.className = 'color-btn' + (state.activeColor === b.dataset.color ? ' active' : '');
  });
  const offBtn = document.querySelector('.color-btn-off');
  if (offBtn) offBtn.className = 'color-btn-off' + (!state.innerLight ? ' active' : '');

  // Outer light
  const ob = document.getElementById('outerLightBadge');
  ob.textContent = state.outerLight ? 'An' : 'Aus';
  ob.className = 'light-badge' + (state.outerLight ? ' on' : '');
  document.getElementById('btnOuterLight').className = 'btn-toggle' +
    (state.outerLight ? ' on' : '') + ' extra';

  // Status bar
  const ts = new Date().toLocaleTimeString('de');
  document.getElementById('statusBar').textContent =
    `Stand: ${ts}${state.connected ? ` | ${state.curTemp.toFixed(1)}°C → ${state.setTemp.toFixed(1)}°C` : ''}`;
}

render();
// Tick clock every second
setInterval(() => {
  document.getElementById('statusBar').textContent =
    `Stand: ${new Date().toLocaleTimeString('de')}` +
    (state.connected ? ` | ${state.curTemp.toFixed(1)}°C → ${state.setTemp.toFixed(1)}°C` : '');
}, 1000);
</script>
</body>
</html>
